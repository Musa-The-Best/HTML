<!DOCTYPE html>
<html>
    mysubmit = () =>{
        const age = this.ageRef.current.value;
        if(age >= 18){
        alert("Login Successful");
        }   else alert("Not Eligible to login");
    }
    constructor(props) {
        super(props);
        this.ageRef = React.createRef();
    }
    <div className="form-group">
        <label> Age </label>
        <input type="number" id="age" ref={this.ageRef} placeholder="Enter your Age" />
    </div>
</html>
